# =============================================================================
# Starship — Minimal single-line prompt
# ~/.config/starship.toml
# =============================================================================

# Top-level format: directory • git • duration → character
format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Add a blank line between shell prompts
add_newline = true

# ─── Directory ────────────────────────────────────────────────────────────────
[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

# ─── Git branch ───────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "
truncation_length = 25
truncation_symbol = "…"

# ─── Git status ───────────────────────────────────────────────────────────────
[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted  = "⚡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date  = ""
untracked   = "?"
stashed     = "󰏗"
modified    = "!"
staged      = "+"
renamed     = "»"
deleted     = "✘"

# ─── Command duration ─────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000          # show only if command took > 2 seconds
style = "bold yellow"
format = "took [$duration]($style) "
show_milliseconds = false

# ─── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

# ─── Line break ───────────────────────────────────────────────────────────────
[line_break]
disabled = false

# ─── Language / runtime modules (disabled for minimal look) ──────────────────
[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

# ─── Palette: Catppuccin Macchiato (default) ──────────────────────────────────
# Theme is overridden by theme-switcher via palette setting
palette = "catppuccin_macchiato"

